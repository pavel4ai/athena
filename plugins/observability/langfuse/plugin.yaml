name: langfuse
version: "1.0.0"
description: "Optional Langfuse observability for Athena — traces conversations, LLM calls, and tool usage. Opt-in via `athena plugins enable observability/langfuse` or `athena tools → Langfuse Observability`."
author: FutureboundCorp
requires_env:
  - ATHENA_LANGFUSE_PUBLIC_KEY
  - ATHENA_LANGFUSE_SECRET_KEY
hooks:
  - pre_api_request
  - post_api_request
  - pre_llm_call
  - post_llm_call
  - pre_tool_call
  - post_tool_call
